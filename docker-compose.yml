version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: booking-mate-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-booking_mate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-booking_mate_password}
      POSTGRES_DB: ${POSTGRES_DB:-booking_mate}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
